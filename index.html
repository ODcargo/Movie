<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Сайт устгагдсан</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e74c3c;
            font-size: 28px;
        }
        p {
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Сайт устгагдсан</h1>
        <p>Энэхүү сайт нь зөрчилтэй контентын улмаас устгагдсан болно.</p>
        <p>Дэлгэрэнгүй мэдээлэл авах бол админтай холбогдоно уу.</p>
    </div>
</body>
</html>
