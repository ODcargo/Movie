<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кино төлбөр</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h2 { text-align: center; }
  .section { margin-bottom: 20px; }
  .section strong { display: block; margin-bottom: 5px; }
  .price { font-size: 22px; font-weight: bold; text-align: center; }
  input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }
  button {
    background: black;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { background: #333; }

  .success, .loading {
    display: none;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    text-align: center;
  }
  .success { background: #e6f9ed; color: #0f5132; }
  .loading { background: #fff3cd; color: #856404; }

  /* Spinner animation */
  .spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #856404;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    margin: 0 auto;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  i { margin-right: 6px; }
</style>
</head>

<body>
<div class="container">
  <h2><i class="fa-solid fa-film"></i> Төлбөр</h2>

  <div class="section price">
    <i class="fa-solid fa-ticket"></i> 1 кино — 3,900₮
  </div>

  <div class="section">
    <strong><i class="fa-solid fa-building-columns"></i> Банк:</strong> Хаан банк<br>
    <strong><i class="fa-solid fa-user"></i> Нэр:</strong> Тэмүүлэн<br>
    <strong><i class="fa-solid fa-credit-card"></i> Данс:</strong> 5466571864<br>
    <strong><i class="fa-solid fa-globe"></i> IBAN:</strong> 490005005466571864
  </div>

  <div class="section">
    <strong><i class="fa-solid fa-pen"></i> Гүйлгээний утга:</strong>
    Утасны дугаар
  </div>

  <div class="section">
    <strong><i class="fa-solid fa-paperclip"></i> Баримт хавсаргах:</strong>
    <input type="file" id="fileInput">
    <button onclick="sendPayment()"><i class="fa-solid fa-paper-plane"></i> Илгээх</button>

    <!-- Loading болон Success -->
    <div class="loading" id="loadingMsg">
      <div class="spinner"></div>
      Илгээж байна...
    </div>
    <div class="success" id="successMsg">
      <i class="fa-solid fa-circle-check"></i> Амжилттай илгээгдлээ!
    </div>
  </div>
</div>

<script>
function sendPayment() {
  const file = document.getElementById("fileInput").files[0];
  const loadingMsg = document.getElementById("loadingMsg");
  const successMsg = document.getElementById("successMsg");

  if (!file) {
    alert("Баримт сонгоно уу!");
    return;
  }

  // Loading харуулах
  loadingMsg.style.display = "block";
  successMsg.style.display = "none";

  // Random delay 3–7 секунд
  const delay = Math.floor(Math.random() * (7000 - 3000 + 1)) + 3000;

  setTimeout(() => {
    loadingMsg.style.display = "none";
    successMsg.style.display = "block";
  }, delay);
}
</script>
</body>
</html>
